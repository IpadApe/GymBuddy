name: Release APK

on:
  push:
    tags:
      - 'v*'          # trigger on tags like v1.1.0, v2.0.0, etc.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub releases and push version.json

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history so we can push back version.json

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download Gradle Wrapper JAR
        run: |
          curl -L "https://github.com/gradle/gradle/raw/v9.3.1/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Extract version info from build.gradle.kts
      - name: Extract version info
        id: version
        run: |
          VERSION_CODE=$(grep 'versionCode\s*=' app/build.gradle.kts | grep -o '[0-9]\+' | head -1)
          VERSION_NAME=$(grep 'versionName\s*=' app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"' | head -1)
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION_NAME ($VERSION_CODE)"

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      # Decode keystore and sign the APK with apksigner
      - name: Sign APK
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > keystore.jks

          # Find the latest build-tools version available
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          echo "Using build-tools: $BUILD_TOOLS"

          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner"
          UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
          SIGNED="app/build/outputs/apk/release/staystrong-${{ steps.version.outputs.VERSION_NAME }}.apk"

          # Sign in-place then rename
          $APKSIGNER sign \
            --ks keystore.jks \
            --ks-key-alias "${{ secrets.SIGNING_KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.SIGNING_STORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.SIGNING_KEY_PASSWORD }}" \
            --out "$SIGNED" \
            "$UNSIGNED"

          echo "Signed APK created: $SIGNED"

          # Verify the signature
          $APKSIGNER verify --verbose "$SIGNED"

      # Update version.json on the main branch so the in-app checker finds the new version
      - name: Update version.json
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"
          VERSION_NAME="${{ steps.version.outputs.VERSION_NAME }}"
          VERSION_CODE="${{ steps.version.outputs.VERSION_CODE }}"
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG}/staystrong-${VERSION_NAME}.apk"

          # Build release notes from tag annotation message
          RAW_NOTES=$(git tag -l --format='%(contents)' "$TAG" | head -50)
          [ -z "$RAW_NOTES" ] && RAW_NOTES="Bug fixes and improvements"

          # Write version.json using python for safe JSON encoding
          python3 - <<PYEOF
          import json
          data = {
              "versionCode": int("${VERSION_CODE}"),
              "versionName": "${VERSION_NAME}",
              "releaseNotes": """${RAW_NOTES}""",
              "downloadUrl": "${DOWNLOAD_URL}",
              "mandatory": False
          }
          with open("version.json", "w") as f:
              json.dump(data, f, indent=2)
          PYEOF

          # Also write RELEASE_NOTES.md for the GitHub release body
          echo "${RAW_NOTES}" > RELEASE_NOTES.md

          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git fetch origin main
          git checkout main
          git add version.json
          git diff --cached --quiet || git commit -m "chore: update version.json to ${VERSION_NAME} (${VERSION_CODE})"
          git push origin main

      # Create the GitHub Release with the signed APK attached
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: StayStrong ${{ steps.version.outputs.VERSION_NAME }}
          body_path: RELEASE_NOTES.md
          files: app/build/outputs/apk/release/staystrong-${{ steps.version.outputs.VERSION_NAME }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
