name: Release APK

on:
  push:
    tags:
      - 'v*'          # trigger on tags like v1.1.0, v2.0.0, etc.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub releases and push version.json

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history so we can push back version.json

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download Gradle Wrapper JAR
        run: |
          curl -L "https://github.com/gradle/gradle/raw/v9.3.1/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Extract version info from build.gradle.kts
      - name: Extract version info
        id: version
        run: |
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | grep -o '[0-9]*')
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION_NAME ($VERSION_CODE)"

      # Extract tag message as release notes (git tag -a v1.1.0 -m "• Fix\n• Feature")
      - name: Extract release notes
        id: notes
        run: |
          NOTES=$(git tag -l --format='%(contents)' "${{ github.ref_name }}" | head -50)
          if [ -z "$NOTES" ]; then
            NOTES="• Bug fixes and improvements"
          fi
          # Escape for JSON
          NOTES_ESCAPED=$(echo "$NOTES" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read().strip()))")
          echo "NOTES_ESCAPED=$NOTES_ESCAPED" >> $GITHUB_OUTPUT
          echo "Release notes: $NOTES"

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      # Sign the APK (optional — skip if no keystore is configured)
      # - name: Sign APK
      #   uses: r0adkll/sign-android-release@v1
      #   with:
      #     releaseDirectory: app/build/outputs/apk/release
      #     signingKeyBase64: ${{ secrets.SIGNING_KEY }}
      #     alias: ${{ secrets.ALIAS }}
      #     keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
      #     keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release-unsigned.apk \
             app/build/outputs/apk/release/staystrong-${{ steps.version.outputs.VERSION_NAME }}.apk || \
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/staystrong-${{ steps.version.outputs.VERSION_NAME }}.apk || true

      # Update version.json on the main branch so the in-app checker finds the new version
      - name: Update version.json
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"
          VERSION_NAME="${{ steps.version.outputs.VERSION_NAME }}"
          VERSION_CODE="${{ steps.version.outputs.VERSION_CODE }}"
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG}/staystrong-${VERSION_NAME}.apk"

          # Build release notes from tag annotation message
          RAW_NOTES=$(git tag -l --format='%(contents)' "$TAG" | head -50)
          [ -z "$RAW_NOTES" ] && RAW_NOTES="Bug fixes and improvements"

          # Write version.json using python for safe JSON encoding
          python3 - <<PYEOF
          import json
          data = {
              "versionCode": int("${VERSION_CODE}"),
              "versionName": "${VERSION_NAME}",
              "releaseNotes": """${RAW_NOTES}""",
              "downloadUrl": "${DOWNLOAD_URL}",
              "mandatory": False
          }
          with open("version.json", "w") as f:
              json.dump(data, f, indent=2)
          PYEOF

          # Also write RELEASE_NOTES.md for the GitHub release body
          echo "${RAW_NOTES}" > RELEASE_NOTES.md

          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git fetch origin main
          git checkout main
          git add version.json
          git diff --cached --quiet || git commit -m "chore: update version.json to ${VERSION_NAME} (${VERSION_CODE})"
          git push origin main

      # Create the GitHub Release with the APK attached
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: GymBuddy ${{ steps.version.outputs.VERSION_NAME }}
          body_path: RELEASE_NOTES.md
          files: app/build/outputs/apk/release/staystrong-${{ steps.version.outputs.VERSION_NAME }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
